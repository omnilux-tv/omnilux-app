name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_MARKETING_SITE_URL: https://omnilux.tv
      VITE_APP_SITE_URL: https://app.omnilux.tv
      VITE_OPS_SITE_URL: https://ops.omnilux.tv
      VITE_SUPABASE_URL: https://api.omnilux.tv
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      VITE_ONE_TIME_CLOUD_CHECKOUT_ENABLED: "false"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Checkout shared packages
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          repository: omnilux-tv/omnilux-packages
          ref: b7aef0372f488b1b05b434525fbc14b3db15e99e
          path: shared/omnilux-packages
          ssh-key: ${{ secrets.OMNILUX_PACKAGES_DEPLOY_KEY }}

      - name: Link shared packages
        run: ln -sfn "$GITHUB_WORKSPACE/shared/omnilux-packages" "$GITHUB_WORKSPACE/../omnilux-packages"

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install shared package dependencies
        run: pnpm install --frozen-lockfile
        working-directory: shared/omnilux-packages

      - name: Build shared types
        run: pnpm --filter @omnilux/types build
        working-directory: shared/omnilux-packages

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Auth tests
        run: pnpm test:auth

      - name: Build
        run: pnpm build
