name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_MARKETING_SITE_URL: https://omnilux.tv
      VITE_APP_SITE_URL: https://app.omnilux.tv
      VITE_OPS_SITE_URL: https://ops.omnilux.tv
      VITE_SUPABASE_URL: https://api.omnilux.tv
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
