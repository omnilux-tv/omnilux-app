name: Service Canary

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    env:
      APP_SITE_URL: https://app.omnilux.tv/login
      OPS_SITE_URL: https://ops.omnilux.tv/login
      RELAY_SITE_URL: https://relay.omnilux.tv/healthz
      MEDIA_SITE_URL: https://media.omnilux.tv/api/health
      CLOUD_AUTH_HEALTH_URL: https://api.omnilux.tv/auth/v1/health
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Run production service canary
        id: canary
        run: node scripts/run-service-canary.mjs

      - name: Open or update canary incident issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          title="Service Canary failure"
          body_file="$(mktemp)"
          cat > "$body_file" <<EOF
          The scheduled OmniLux service canary failed.

          Latest run: $RUN_URL

          Checklist:
          - Verify app.omnilux.tv login reachability
          - Verify ops.omnilux.tv login reachability
          - Verify relay.omnilux.tv/healthz
          - Verify media.omnilux.tv/api/health
          - Verify api.omnilux.tv auth reachability
          - Update the managed media incident state in Ops if customer impact is confirmed
          EOF

          existing_issue="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number')"
          if [ -n "$existing_issue" ]; then
            gh issue comment "$existing_issue" --body-file "$body_file"
          else
            gh issue create --title "$title" --body-file "$body_file"
          fi
