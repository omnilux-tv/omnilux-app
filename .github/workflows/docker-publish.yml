name: Publish App Image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/omnilux-tv/omnilux-app

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Checkout shared packages
        uses: actions/checkout@v5
        with:
          repository: omnilux-tv/omnilux-packages
          path: shared/omnilux-packages
          ssh-key: ${{ secrets.OMNILUX_PACKAGES_DEPLOY_KEY }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Capture build timestamp
        id: build_timestamp
        run: echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build image for verification
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-contexts: |
            omnilux-packages=./shared/omnilux-packages
          load: true
          platforms: linux/amd64
          build-args: |
            VITE_MARKETING_SITE_URL=${{ vars.VITE_MARKETING_SITE_URL || 'https://omnilux.tv' }}
            VITE_APP_SITE_URL=${{ vars.VITE_APP_SITE_URL || 'https://app.omnilux.tv' }}
            VITE_OPS_SITE_URL=${{ vars.VITE_OPS_SITE_URL || 'https://ops.omnilux.tv' }}
            VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL || 'https://api.omnilux.tv' }}
            VITE_SUPABASE_BROWSER_VALUE=${{ vars.VITE_SUPABASE_ANON_KEY }}
            VITE_WORKOS_CLIENT_ID=${{ vars.VITE_WORKOS_CLIENT_ID }}
            VITE_WORKOS_API_HOSTNAME=${{ vars.VITE_WORKOS_API_HOSTNAME }}
            VITE_WORKOS_DEV_MODE=${{ vars.VITE_WORKOS_DEV_MODE || 'false' }}
            VITE_OAUTH_PROVIDERS=${{ vars.VITE_OAUTH_PROVIDERS }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
            VITE_WEB_VITALS_ENDPOINT=${{ vars.VITE_WEB_VITALS_ENDPOINT }}
            OMNILUX_BUILD_REPOSITORY=${{ github.repository }}
            OMNILUX_BUILD_REF=${{ github.ref_name }}
            OMNILUX_BUILD_SHA=${{ github.sha }}
            OMNILUX_BUILD_CREATED=${{ steps.build_timestamp.outputs.created }}
          tags: omnilux-app-verify:latest

      - name: Verify app artifact exists
        run: |
          docker run --rm --entrypoint sh -e GITHUB_SHA omnilux-app-verify:latest -lc '
            set -eu
            test -f /srv/index.html
            test -d /srv/assets
            test -f /srv/.well-known/omnilux-build.json
            grep -F "\"sha\": \"${GITHUB_SHA}\"" /srv/.well-known/omnilux-build.json
          '

      - name: Verify static asset fallback fails closed
        run: |
          set -eu
          container_id=$(docker run -d -p 127.0.0.1::8080 omnilux-app-verify:latest)
          cleanup() { docker rm -f "$container_id" >/dev/null; }
          trap cleanup EXIT
          port=$(docker port "$container_id" 8080/tcp | sed 's/.*://')
          for attempt in 1 2 3 4 5; do
            if curl -fsS "http://127.0.0.1:${port}/" >/dev/null; then
              break
            fi
            if [ "$attempt" = "5" ]; then
              echo "app image did not become ready" >&2
              exit 1
            fi
            sleep 1
          done
          test "$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:${port}/assets/not-real.js")" = "404"
          test "$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:${port}/.well-known/omnilux-build.json")" = "200"
          test "$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:${port}/dashboard")" = "200"

      - name: Verify branded API boundary
        run: |
          docker run --rm --entrypoint sh omnilux-app-verify:latest -lc '
            set -eu
            if grep -R -E "https://[a-z0-9-]+\\.supabase\\.co" /srv >/dev/null; then
              echo "Browser artifact contains a raw Supabase project URL; use https://api.omnilux.tv instead." >&2
              exit 1
            fi
            grep -R "https://api.omnilux.tv" /srv >/dev/null
          '

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-contexts: |
            omnilux-packages=./shared/omnilux-packages
          push: true
          platforms: linux/amd64
          build-args: |
            VITE_MARKETING_SITE_URL=${{ vars.VITE_MARKETING_SITE_URL || 'https://omnilux.tv' }}
            VITE_APP_SITE_URL=${{ vars.VITE_APP_SITE_URL || 'https://app.omnilux.tv' }}
            VITE_OPS_SITE_URL=${{ vars.VITE_OPS_SITE_URL || 'https://ops.omnilux.tv' }}
            VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL || 'https://api.omnilux.tv' }}
            VITE_SUPABASE_BROWSER_VALUE=${{ vars.VITE_SUPABASE_ANON_KEY }}
            VITE_WORKOS_CLIENT_ID=${{ vars.VITE_WORKOS_CLIENT_ID }}
            VITE_WORKOS_API_HOSTNAME=${{ vars.VITE_WORKOS_API_HOSTNAME }}
            VITE_WORKOS_DEV_MODE=${{ vars.VITE_WORKOS_DEV_MODE || 'false' }}
            VITE_OAUTH_PROVIDERS=${{ vars.VITE_OAUTH_PROVIDERS }}
            VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}
            VITE_WEB_VITALS_ENDPOINT=${{ vars.VITE_WEB_VITALS_ENDPOINT }}
            OMNILUX_BUILD_REPOSITORY=${{ github.repository }}
            OMNILUX_BUILD_REF=${{ github.ref_name }}
            OMNILUX_BUILD_SHA=${{ github.sha }}
            OMNILUX_BUILD_CREATED=${{ steps.build_timestamp.outputs.created }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
