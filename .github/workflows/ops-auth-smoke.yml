name: Ops Auth Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 14 * * *'

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      OPS_SITE_URL: https://ops.omnilux.tv
      OPS_SMOKE_OPERATOR_EMAIL: ${{ secrets.OPS_SMOKE_OPERATOR_EMAIL }}
      OPS_SMOKE_OPERATOR_PASSWORD: ${{ secrets.OPS_SMOKE_OPERATOR_PASSWORD }}
      OPS_SMOKE_CUSTOMER_EMAIL: ${{ secrets.OPS_SMOKE_CUSTOMER_EMAIL }}
      OPS_SMOKE_CUSTOMER_PASSWORD: ${{ secrets.OPS_SMOKE_CUSTOMER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run ops auth smoke
        run: pnpm test:smoke:ops
