name: Ops Auth Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 14 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      APP_SITE_URL: https://app.omnilux.tv
      OPS_SITE_URL: https://ops.omnilux.tv
      OPS_SMOKE_OPERATOR_EMAIL: ${{ secrets.OPS_SMOKE_OPERATOR_EMAIL }}
      OPS_SMOKE_OPERATOR_PASSWORD: ${{ secrets.OPS_SMOKE_OPERATOR_PASSWORD }}
      OPS_SMOKE_CUSTOMER_EMAIL: ${{ secrets.OPS_SMOKE_CUSTOMER_EMAIL }}
      OPS_SMOKE_CUSTOMER_PASSWORD: ${{ secrets.OPS_SMOKE_CUSTOMER_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Run ops auth smoke
        run: pnpm test:smoke:ops
